<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Heart Catch · smooth mobile & desktop</title>
  <!-- Google Fonts: bold & playful -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800;900&family=Poppins:wght@600;700&display=swap" rel="stylesheet">
  <style>
    /* ----- RESET & full bleed, mobile optimized ----- */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent; /* kill flash on tap */
      user-select: none;
      -webkit-touch-callout: none;
    }

    body {
      min-height: 100vh;
      min-height: -webkit-fill-available; /* better for mobile safari */
      background: linear-gradient(135deg, #8f44ad, #ff75c3, #b84a8c, #ff75c3);
      background-size: 400% 400%;
      animation: gradientFlow 14s ease infinite;
      font-family: 'Poppins', 'Montserrat', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow-x: hidden;
      overflow-y: auto; /* allow small scroll if needed, but we contain */
      touch-action: pan-y pinch-zoom; /* prevents pull-to-refresh while allowing scroll */
    }

    @keyframes gradientFlow {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    /* floating heart particles – lightweight CSS only, no extra paint */
    .floating-hearts {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 1;
      overflow: hidden;
    }

    .heart-particle {
      position: absolute;
      color: rgba(255, 240, 250, 0.8);
      font-size: 1.6rem;
      opacity: 0;
      animation: floatUp 14s linear infinite;
      filter: drop-shadow(0 0 8px #ffb6d9);
      will-change: transform, opacity;
    }

    @keyframes floatUp {
      0% { transform: translateY(100vh) scale(0.6); opacity: 0.2; }
      30% { opacity: 1; }
      70% { opacity: 0.8; transform: translateY(30vh) scale(1.2) rotate(5deg); }
      100% { transform: translateY(-20vh) scale(0.5); opacity: 0; }
    }

    /* main container – flexible, no fixed heights that trap */
    .game-container {
      position: relative;
      z-index: 20;
      width: 100%;
      max-width: 680px;
      padding: 0.8rem 1rem 2rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh; /* fallback */
      min-height: -webkit-fill-available;
    }

    /* status glass panel */
    .status-panel {
      background: rgba(255, 255, 255, 0.2);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-radius: 60px;
      padding: 0.8rem 1.8rem;
      margin: 0.5rem 0 2rem;
      border: 1px solid rgba(255,255,255,0.35);
      box-shadow: 0 15px 30px rgba(0,0,0,0.15);
      width: fit-content;
    }

    .remark {
      font-size: 1.8rem;
      font-weight: 800;
      color: white;
      text-shadow: 2px 2px 0 #b03b70;
      letter-spacing: 0.5px;
      font-family: 'Montserrat', sans-serif;
      text-align: center;
      line-height: 1.3;
      white-space: nowrap;
    }
    @media (max-width: 480px) {
      .remark { font-size: 1.4rem; white-space: normal; }
    }

    /* HEART ZONE: relative + full width, no fixed height to avoid clipping */
    .heart-zone {
      position: relative;
      width: 100%;
      flex: 1 1 auto;
      min-height: 260px;   /* flexible but enough space */
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0.5rem 0 1.5rem;
      touch-action: none;   /* prevent page drag while interacting inside zone */
    }

    /* ----- The fleeing heart (button) ----- */
    .heart-btn {
      position: absolute;   /* will be moved via transform (left/top) */
      font-size: 5.5rem;
      background: transparent;
      border: none;
      cursor: pointer;
      filter: drop-shadow(0 15px 25px rgba(200, 20, 100, 0.5));
      animation: softPulse 1.8s infinite alternate;
      transition: filter 0.2s;
      text-shadow: 0 0 25px #ffb0d0;
      line-height: 1;
      padding: 0;
      margin: 0;
      will-change: left, top, transform;
      /* size for collision area – we'll use a wrapper approach? just the emoji is fine */
      pointer-events: auto;
      -webkit-tap-highlight-color: transparent;
      /* avoid any extra touch delay */
      touch-action: none;
    }

    @keyframes softPulse {
      0% { transform: scale(1); filter: drop-shadow(0 10px 18px #ff80b0); }
      100% { transform: scale(1.12); filter: drop-shadow(0 25px 35px #ff3f8f); }
    }

    /* yield state: intense glow, no pulse */
    .heart-btn.yield {
      animation: none;
      filter: drop-shadow(0 0 40px #ffe085) drop-shadow(0 0 90px #ff80b5);
      transform: scale(1.2);
    }

    /* glassmorphism reveal card */
    .reveal-card {
      background: rgba(255, 255, 255, 0.2);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-radius: 60px;
      padding: 2rem 1.8rem;
      width: 100%;
      border: 1px solid rgba(255,255,255,0.5);
      box-shadow: 0 30px 50px rgba(0,0,0,0.25), inset 0 2px 4px rgba(255,255,255,0.6);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.8rem;
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.5s ease, visibility 0s 0.5s;
    }

    .reveal-card.show {
      opacity: 1;
      visibility: visible;
      transition: opacity 0.5s ease, visibility 0s 0s;
    }

    .love-message {
      font-size: 2.3rem;
      font-weight: 900;
      color: white;
      text-align: center;
      text-shadow: 4px 4px 0 #b23b75;
      font-family: 'Montserrat', sans-serif;
      line-height: 1.2;
    }

    .gif-placeholder {
      width: 180px;
      height: 180px;
      border-radius: 40px;
      background: rgba(255,215,235,0.3);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 5rem;
      border: 3px solid white;
      box-shadow: 0 20px 30px rgba(0,0,0,0.2);
    }

    .replay-btn {
      background: white;
      border: none;
      padding: 1rem 2.8rem;
      border-radius: 50px;
      font-size: 1.7rem;
      font-weight: bold;
      color: #b1316a;
      box-shadow: 0 10px 0 #a13d68, 0 8px 25px hotpink;
      cursor: pointer;
      transition: all 0.08s linear;
      font-family: 'Poppins', sans-serif;
    }

    .replay-btn:active {
      transform: translateY(7px);
      box-shadow: 0 3px 0 #a13d68, 0 8px 20px hotpink;
    }

    /* canvas for heart burst (fixed) */
    #heartBurstCanvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 9999;
      display: none;
    }

    /* small screen adjustments */
    @media (max-width: 450px) {
      .heart-btn { font-size: 4.8rem; }
      .love-message { font-size: 1.8rem; }
      .gif-placeholder { width: 150px; height: 150px; font-size: 4rem; }
    }
  </style>
</head>
<body>
  <!-- floating hearts background (static, performance friendly) -->
  <div class="floating-hearts" id="floatingHearts"></div>

  <div class="game-container">
    <div class="status-panel">
      <div class="remark" id="statusRemark">💓 catch me?</div>
    </div>

    <!-- dedicated zone for heart movement -->
    <div class="heart-zone" id="heartZone"></div>  <!-- heart button will be inside via DOM, but we attach to body? we'll manage -->

    <!-- reveal card (hidden initially) -->
    <div class="reveal-card" id="revealCard">
      <div class="love-message" id="loveMessage">you're my forever</div>
      <div class="gif-placeholder" id="gifBox">🥰💕</div>
      <button class="replay-btn" id="replayBtn">again</button>
    </div>
  </div>

  <canvas id="heartBurstCanvas"></canvas>

  <script>
    (function() {
      // ----- PLAYLIST -----
      const remarks = [
        "Too fast! 💨", "Nice try 😏", "almost! 🔥", "woosh~", "nope 💕",
        "catch me 🏃", "faster 💘", "slippery!", "off I go!", "😜 ha!"
      ];

      const loveMessages = [
        "my heart is yours",
        "you're my favorite",
        "all of me loves you",
        "endless love",
        "infinitely yours"
      ];

      // ----- DOM references -----
      const heartBtn = document.createElement('button');
      heartBtn.className = 'heart-btn';
      heartBtn.id = 'fleeingHeart';
      heartBtn.setAttribute('aria-label', 'fleeing heart');
      heartBtn.innerHTML = '❤️';  // heart emoji

      // We'll attach heart directly to body to avoid any clipping container, but we want it inside visual flow.
      // Use fixed positioning relative to viewport for total freedom. And place inside game-container for semantic?
      // But we need it to be able to go anywhere. So we attach to body, but keep it above everything.
      document.body.appendChild(heartBtn);  // heart is now direct child of body, with fixed positioning

      // style it fixed (already in CSS), but ensure high z-index
      heartBtn.style.position = 'fixed';
      heartBtn.style.zIndex = '1000';
      heartBtn.style.left = '50%';
      heartBtn.style.top = '50%';
      heartBtn.style.transform = 'translate(-50%, -50%)';

      // other elements
      const remarkEl = document.getElementById('statusRemark');
      const revealCard = document.getElementById('revealCard');
      const loveMsgEl = document.getElementById('loveMessage');
      const replayBtn = document.getElementById('replayBtn');
      const canvas = document.getElementById('heartBurstCanvas');
      let ctx = canvas.getContext('2d');

      // ----- Game state -----
      let escapeCount = 0;
      const MAX_ESCAPES = 7;
      let gamePhase = 'chasing';        // 'chasing', 'yield', 'reveal'
      let canTeleport = true;
      let teleportThrottle = false;      // prevent event flood

      // ----- helper: get random visible fixed position (keeping emoji fully inside) -----
      function getRandomPosition() {
        const heartWidth = heartBtn.offsetWidth;
        const heartHeight = heartBtn.offsetHeight;

        // fallback if offset is 0 (not rendered yet)
        const w = heartWidth || 80;   // approximate
        const h = heartHeight || 80;

        const maxLeft = window.innerWidth - w;
        const maxTop = window.innerHeight - h;

        // ensure never negative or overflow
        const left = Math.max(2, Math.min(maxLeft - 2, Math.random() * window.innerWidth));
        const top = Math.max(2, Math.min(maxTop - 2, Math.random() * window.innerHeight));
        return { left, top };
      }

      // safely move heart (with throttle to avoid crazy stacking)
      function teleportHeart() {
        if (!canTeleport || gamePhase !== 'chasing' || teleportThrottle) return;
        teleportThrottle = true;
        const pos = getRandomPosition();
        heartBtn.style.left = pos.left + 'px';
        heartBtn.style.top = pos.top + 'px';

        // release throttle after short time (faster than human interactions)
        setTimeout(() => { teleportThrottle = false; }, 40);  // 40ms cooldown
      }

      // random remark
      function setRandomRemark() {
        const idx = Math.floor(Math.random() * remarks.length);
        remarkEl.innerText = remarks[idx];
      }

      // ----- flee handler (works with both mouse and touch) -----
      function fleeHandler(e) {
        // Prevent default to avoid scrolling or zoom
        e.preventDefault();
        if (gamePhase !== 'chasing' || !canTeleport) return;

        // count escape
        escapeCount++;
        setRandomRemark();

        if (escapeCount >= MAX_ESCAPES) {
          // YIELD MODE
          gamePhase = 'yield';
          canTeleport = false;
          heartBtn.classList.add('yield');
          remarkEl.innerText = '✨ You win! My heart is tired. Click it! ✨';
          // keep heart at same position
        } else {
          teleportHeart();  // move away
        }
      }

      // attach both mouseenter and touchstart (touch will fire multiple times but throttle will reduce)
      heartBtn.addEventListener('mouseenter', fleeHandler);
      heartBtn.addEventListener('touchstart', fleeHandler, { passive: false });

      // ----- final click (only when yield) -----
      function finalClickHandler(e) {
        if (gamePhase === 'yield') {
          gamePhase = 'reveal';
          canTeleport = false;

          // random love message
          loveMsgEl.innerText = loveMessages[Math.floor(Math.random() * loveMessages.length)];

          // show glass card
          revealCard.classList.add('show');

          // launch heart burst
          startHeartBurst();

          // fade heart a bit but keep visible
          heartBtn.style.opacity = '0.35';
          heartBtn.style.pointerEvents = 'none';   // avoid extra clicks

          remarkEl.innerText = '❤️ forever yours ❤️';
        }
      }
      heartBtn.addEventListener('click', finalClickHandler);
      // for touch devices, click works but also add touchend to be safe
      heartBtn.addEventListener('touchend', (e) => {
        e.preventDefault();
        if (gamePhase === 'yield') finalClickHandler(e);
      });

      // ----- replay -----
      function restartGame() {
        escapeCount = 0;
        gamePhase = 'chasing';
        canTeleport = true;
        teleportThrottle = false;
        heartBtn.classList.remove('yield');
        heartBtn.style.opacity = '1';
        heartBtn.style.pointerEvents = 'auto';
        revealCard.classList.remove('show');

        // reset heart to center (respecting bounds)
        const centerLeft = (window.innerWidth / 2) - (heartBtn.offsetWidth / 2);
        const centerTop = (window.innerHeight / 2) - (heartBtn.offsetHeight / 2);
        heartBtn.style.left = Math.max(0, centerLeft) + 'px';
        heartBtn.style.top = Math.max(0, centerTop) + 'px';

        remarkEl.innerText = '💓 catch me?';

        // clear canvas
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        canvas.style.display = 'none';
        if (burstFrame) cancelAnimationFrame(burstFrame);
        burstFrame = null;
      }
      replayBtn.addEventListener('click', restartGame);
      replayBtn.addEventListener('touchend', (e) => { e.preventDefault(); restartGame(); });

      // ----- heart burst (confetti style) -----
      let particles = [];
      let burstFrame = null;

      function startHeartBurst() {
        canvas.style.display = 'block';
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        particles = [];
        for (let i = 0; i < 150; i++) {
          particles.push({
            x: Math.random() * canvas.width,
            y: Math.random() * canvas.height,
            vx: (Math.random() - 0.5) * 12,
            vy: (Math.random() - 1) * 12 - 6,
            size: Math.random() * 34 + 18,
            opacity: Math.random() * 0.9 + 0.2,
            char: Math.random() > 0.5 ? '❤️' : '💖',
          });
        }

        function draw() {
          ctx.clearRect(0, 0, canvas.width, canvas.height);
          let anyAlive = false;
          for (let p of particles) {
            p.x += p.vx;
            p.y += p.vy;
            p.vy += 0.2;   // gravity
            p.vx *= 0.99;
            p.opacity *= 0.992;
            if (p.y < canvas.height + 60 && p.opacity > 0.01) anyAlive = true;

            ctx.font = `${p.size}px 'Segoe UI', 'Arial', 'Apple Color Emoji'`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.shadowColor = '#ffb0d0';
            ctx.shadowBlur = 20;
            ctx.globalAlpha = p.opacity;
            ctx.fillStyle = 'white';
            ctx.fillText(p.char, p.x, p.y);
          }
          ctx.shadowBlur = 0;
          ctx.globalAlpha = 1;

          if (anyAlive) {
            burstFrame = requestAnimationFrame(draw);
          } else {
            canvas.style.display = 'none';
            particles = [];
          }
        }
        draw();
      }

      // ----- background floating hearts generation (lightweight) -----
      function generateFloatingHearts(count = 18) {
        const container = document.getElementById('floatingHearts');
        for (let i = 0; i < count; i++) {
          const heart = document.createElement('span');
          heart.className = 'heart-particle';
          heart.innerText = ['❤️', '💗', '💕', '💓'][Math.floor(Math.random() * 4)];
          heart.style.left = Math.random() * 100 + '%';
          heart.style.animationDelay = Math.random() * 12 + 's';
          heart.style.animationDuration = (Math.random() * 10 + 10) + 's';
          heart.style.fontSize = (Math.random() * 28 + 18) + 'px';
          container.appendChild(heart);
        }
      }
      generateFloatingHearts(20);

      // ----- window resize: ensure heart stays within bounds, and adjust canvas-----
      window.addEventListener('resize', () => {
        if (gamePhase === 'chasing' || gamePhase === 'yield') {
          // if heart is out of new bounds, reposition gently (only if needed)
          const rect = heartBtn.getBoundingClientRect();
          const tol = 5;
          if (rect.right > window.innerWidth + tol || rect.left < -tol || rect.bottom > window.innerHeight + tol || rect.top < -tol) {
            // teleport to safe spot, but only if chasing & canTeleport, else clamp?
            if (gamePhase === 'chasing' && canTeleport) {
              const pos = getRandomPosition();
              heartBtn.style.left = pos.left + 'px';
              heartBtn.style.top = pos.top + 'px';
            } else if (gamePhase === 'yield') {
              // clamp to visible (soft)
              const newLeft = Math.min(window.innerWidth - rect.width, Math.max(0, rect.left));
              const newTop = Math.min(window.innerHeight - rect.height, Math.max(0, rect.top));
              heartBtn.style.left = newLeft + 'px';
              heartBtn.style.top = newTop + 'px';
            }
          }
        }
        if (canvas.style.display === 'block') {
          canvas.width = window.innerWidth;
          canvas.height = window.innerHeight;
        }
      });

      // extra safety for touch: prevent page move on heart zone (but heart is fixed)
      document.body.addEventListener('touchmove', (e) => {
        if (e.target === heartBtn) e.preventDefault();
      }, { passive: false });

      // ensure initial heart center
      function setInitialHeartPos() {
        const left = (window.innerWidth / 2) - (heartBtn.offsetWidth / 2);
        const top = (window.innerHeight / 2) - (heartBtn.offsetHeight / 2);
        heartBtn.style.left = Math.max(2, left) + 'px';
        heartBtn.style.top = Math.max(2, top) + 'px';
      }
      setInitialHeartPos();
      // fallback for images not loaded
      window.addEventListener('load', setInitialHeartPos);

      // disable context menu on heart
      heartBtn.addEventListener('contextmenu', (e) => e.preventDefault());

      // small throttle for touch events to avoid double count
      let touchGuard = false;
      heartBtn.addEventListener('touchstart', (e) => {
        if (!touchGuard) {
          touchGuard = true;
          setTimeout(() => { touchGuard = false; }, 100);
        } else {
          e.preventDefault();  // ignore rapid extra touches
        }
      }, { passive: false });
    })();
  </script>
</body>
</html>

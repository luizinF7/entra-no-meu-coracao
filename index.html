<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para Você ❤️</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">

    <style>
        /* --- RESET & BASE --- */
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }

        body {
            font-family: 'Poppins', sans-serif;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            background: linear-gradient(-45deg, #8f44ad, #ff75c3, #4a00e0, #ff0055);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* --- BACKGROUND PARTICLES --- */
        .particle {
            position: absolute;
            color: rgba(255, 255, 255, 0.4);
            font-size: 1.5rem;
            pointer-events: none;
            animation: floatUp linear infinite;
            z-index: 0;
        }

        @keyframes floatUp {
            0% { transform: translateY(100vh) scale(0.5); opacity: 0; }
            20% { opacity: 0.6; }
            100% { transform: translateY(-10vh) scale(1.2); opacity: 0; }
        }

        /* --- GAME UI --- */
        #game-container {
            position: relative;
            width: 100%;
            height: 100%;
            z-index: 10;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        #status-text {
            position: absolute;
            top: 10%;
            font-size: 1.5rem;
            font-weight: 600;
            text-align: center;
            text-shadow: 0 2px 4px rgba(0,0,0,0.2);
            pointer-events: none;
            transition: opacity 0.3s;
        }

        /* O Coração */
        #target-heart {
            font-size: 5rem;
            position: absolute;
            cursor: pointer;
            filter: drop-shadow(0 0 10px rgba(255, 255, 255, 0.5));
            z-index: 20;
            /* Centralizado inicialmente */
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            transition: transform 0.1s ease;
        }

        /* Animação de Pulsar */
        .pulsing { animation: pulse 1.5s infinite; }

        @keyframes pulse {
            0% { transform: translate(-50%, -50%) scale(1); }
            50% { transform: translate(-50%, -50%) scale(1.15); }
            100% { transform: translate(-50%, -50%) scale(1); }
        }

        /* Animação de Tremida (quando foge) */
        .shake { animation: shake 0.5s; }

        @keyframes shake {
            0% { transform: translate(-50%, -50%) rotate(0deg); }
            25% { transform: translate(-50%, -50%) rotate(-10deg); }
            75% { transform: translate(-50%, -50%) rotate(10deg); }
            100% { transform: translate(-50%, -50%) rotate(0deg); }
        }

        /* Estado "Cansado" (Glow) */
        .tired {
            animation: intenseGlow 0.5s infinite alternate;
            filter: drop-shadow(0 0 20px #ff75c3);
        }

        @keyframes intenseGlow {
            from { transform: translate(-50%, -50%) scale(1); }
            to { transform: translate(-50%, -50%) scale(1.3); }
        }

        /* --- REVEAL CARD (Glassmorphism) --- */
        #reveal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.8s ease;
        }

        #reveal-overlay.active { opacity: 1; pointer-events: all; }

        .glass-card {
            background: rgba(255, 255, 255, 0.15);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.18);
            padding: 2rem;
            width: 90%;
            max-width: 400px;
            text-align: center;
            transform: scale(0.8);
            transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        #reveal-overlay.active .glass-card { transform: scale(1); }

        .love-message {
            font-size: 1.4rem;
            font-weight: 800;
            margin-bottom: 1.5rem;
            line-height: 1.4;
        }

        .cute-gif {
            width: 100%;
            max-width: 200px;
            border-radius: 10px;
            margin-bottom: 1.5rem;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .replay-btn {
            background: white;
            color: #8f44ad;
            border: none;
            padding: 12px 24px;
            font-size: 1rem;
            font-weight: 700;
            border-radius: 50px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            font-family: 'Poppins', sans-serif;
        }

        .replay-btn:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(255, 255, 255, 0.4); }

        /* Confetti Canvas */
        #confetti-canvas {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 50;
        }

        @media (max-width: 600px) {
            #target-heart { font-size: 4rem; }
            #status-text { font-size: 1.1rem; top: 5%; }
        }
    </style>
</head>
<body>

    <div id="particles-container"></div>
    <canvas id="confetti-canvas"></canvas>

    <div id="game-container">
        <div id="status-text">Tente pegar meu coração! ❤️</div>
        <div id="target-heart" class="pulsing">❤️</div>
    </div>

    <div id="reveal-overlay">
        <div class="glass-card">
            <div class="love-message" id="love-msg">...</div>
            <img src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExM3Z5eW55eW55eW55eW55eW55eW55eW55eW55eW55eW55eSZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/26BRv0ThflsHCqDrG/giphy.gif" alt="Cute Bear Hug" class="cute-gif">
            <button class="replay-btn" onclick="resetGame()">Replay</button>
        </div>
    </div>

    <script>
        // --- CONFIGURAÇÃO ---
        const MAX_ATTEMPTS = 7;
        let attempts = 0;
        let isWon = false;

        // Elementos DOM
        const heart = document.getElementById('target-heart');
        const statusText = document.getElementById('status-text');
        const revealOverlay = document.getElementById('reveal-overlay');
        const loveMsgEl = document.getElementById('love-msg');
        const particlesContainer = document.getElementById('particles-container');

        // Mensagens
        const messages = [
            "Muito rápido!", "Boa tentativa!", "Quase lá!", "Tão perto!", "Quase pegou!"
        ];
        
        const romanticMessages = [
            "Você ilumina meu mundo só por estar nele.",
            "Cada momento com você é um tesouro.",
            "Você é a peça que faltava no meu quebra-cabeça.",
            "Meu coração dispara toda vez que vejo seu nome.",
            "Eu te amo mais do que palavras podem dizer."
        ];

        // --- INICIALIZAÇÃO ---
        function init() {
            createFloatingParticles();
            setupEventListeners();
        }

        // --- PARTÍCULAS DE FUNDO ---
        function createFloatingParticles() {
            const particleCount = 20;
            for (let i = 0; i < particleCount; i++) {
                const p = document.createElement('div');
                p.classList.add('particle');
                p.innerHTML = Math.random() > 0.5 ? '❤️' : '✨';
                p.style.left = Math.random() * 100 + 'vw';
                p.style.animationDuration = (Math.random() * 5 + 5) + 's';
                p.style.fontSize = (Math.random() * 1 + 0.5) + 'rem';
                particlesContainer.appendChild(p);
            }
        }

        // --- LÓGICA DO JOGO ---
        function setupEventListeners() {
            // Usamos 'pointerdown' para funcionar melhor em mobile e desktop
            heart.addEventListener('pointerdown', (e) => {
                e.preventDefault(); // Evita comportamento padrão de toque
                
                if (isWon) {
                    // Se já venceu, apenas dispara o clique normal
                    heart.click();
                } else {
                    // Se ainda não venceu, faz ele fugir
                    moveHeart();
                }
            });
        }

        function moveHeart() {
            attempts++;
            
            // Atualiza texto
            if (attempts < MAX_ATTEMPTS) {
                const remark = messages[Math.min(attempts - 1, messages.length - 1)];
                statusText.innerText = `${remark} (${attempts}/${MAX_ATTEMPTS})`;
            }

            // Adiciona efeito de tremida
            heart.classList.remove('shake');
            void heart.offsetWidth; // Trigger reflow
            heart.classList.add('shake');

            // Calcula nova posição aleatória
            // Subtraímos 100px para garantir que não saia da tela
            const x = Math.random() * (window.innerWidth - 100);
            const y = Math.random() * (window.innerHeight - 100);

            // Aplica nova posição
            heart.style.left = `${x}px`;
            heart.style.top = `${y}px`;
            heart.style.transform = 'translate(0, 0)'; // Remove o centralizador

            // Verifica se deve parar
            if (attempts >= MAX_ATTEMPTS) {
                yieldHeart();
            }
        }

        function yieldHeart() {
            isWon = true;
            statusText.style.display = 'none';
            heart.classList.remove('pulsing');
            heart.classList.add('tired');
            heart.innerText = "💖";
            
            // Texto final
            statusText.innerText = "Você venceu! Clique aqui!";
            statusText.style.display = 'block';
            statusText.style.top = '15%';
            statusText.style.fontSize = '1.2rem';
            statusText.style.color = '#ff75c3';
        }

        // --- REVELAÇÃO ---
        heart.addEventListener('click', triggerReveal);

        function triggerReveal() {
            if (!isWon) return;

            // Remove listeners para evitar bugs
            heart.removeEventListener('click', triggerReveal);
            heart.removeEventListener('pointerdown', moveHeart);

            // Confetti
            startConfetti();

            // Mensagem Aleatória
            const randomMsg = romanticMessages[Math.floor(Math.random() * romanticMessages.length)];
            loveMsgEl.innerText = randomMsg;

            // Mostra o cartão
            revealOverlay.classList.add('active');
        }

        // --- REPLAY ---
        function resetGame() {
            attempts = 0;
            isWon = false;
            
            revealOverlay.classList.remove('active');
            heart.classList.remove('tired');
            heart.classList.add('pulsing');
            heart.innerText = "❤️";
            
            statusText.style.display = 'block';
            statusText.innerText = "Tente pegar meu coração! ❤️";
            statusText.style.color = 'white';
            statusText.style.top = '10%';
            statusText.style.fontSize = '1.5rem';

            // Reseta posição
            heart.style.left = '50%';
            heart.style.top = '50%';
            heart.style.transform

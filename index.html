<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pega o Coração!</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: linear-gradient(135deg, #ff75c3, #8f44ad);
            font-family: 'Arial Black', sans-serif;
            overflow: hidden;
            position: relative;
        }

        #instrucao {
            color: black;
            font-size: 1.8rem;
            margin-bottom: 20px;
            z-index: 5;
            text-shadow: 1px 1px 5px rgba(255,255,255,0.5);
        }

        /* O botão de coração */
        .btn-coracao {
            font-size: 5rem;
            background: none;
            border: none;
            cursor: pointer;
            z-index: 100;
            position: absolute; /* Obrigatório para o movimento funcionar */
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            transition: all 0.2s ease; /* Faz o movimento ser suave */
        }

        #conteudo-final {
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: white;
            z-index: 200;
        }

        .imagem-fofa {
            max-width: 80%;
            border-radius: 15px;
            margin: 20px 0;
        }

        .heart-bg {
            position: absolute;
            color: rgba(255, 255, 255, 0.3);
            animation: float 6s linear infinite;
            bottom: -50px;
        }

        @keyframes float {
            0% { transform: translateY(0); opacity: 1; }
            100% { transform: translateY(-110vh); opacity: 0; }
        }
    </style>
</head>
<body>

    <div id="instrucao">TENTE PEGAR MEU CORAÇÃO! ❤️</div>
    <button id="coracao-foge" class="btn-coracao">❤️</button>

    <div id="conteudo-final">
        <h1 style="color: #8f44ad; padding: 20px;">VOCÊ ME PEGOU! ❤️</h1>
        <p style="font-size: 1.2rem;">SÓ VOCÊ ESTÁ NO MEU CORAÇÃO!</p>
        <img class="imagem-fofa" src="https://i.pinimg.com/originals/e0/fd/25/e0fd25f9127a9a1098b064c2f88f4021.gif">
        <button onclick="location.reload()" style="padding: 10px 20px; cursor: pointer;">Recomeçar</button>
    </div>

    <script>
        const btn = document.getElementById('coracao-foge');
        let tentativas = 0;
        const limiteFuga = 6; // Ele foge 6 vezes

        function desviar() {
            if (tentativas < limiteFuga) {
                // Calcula posições aleatórias
                const x = Math.random() * (window.innerWidth - btn.offsetWidth);
                const y = Math.random() * (window.innerHeight - btn.offsetHeight);
                
                // Aplica a nova posição
                btn.style.left = x + 'px';
                btn.style.top = y + 'px';
                btn.style.transform = 'none'; // Remove o centralizador inicial
                
                tentativas++;
            } else {
                // Para de fugir e deixa clicar
                document.getElementById('instrucao').innerText = "OK, VOCÊ VENCEU! CLICA AGORA! ❤️";
                btn.style.filter = "drop-shadow(0 0 10px gold)";
            }
        }

        // Eventos para fugir
        btn.addEventListener('mouseover', desviar); // No PC (passar o mouse)
        btn.addEventListener('touchstart', (e) => {
            e.preventDefault(); // Evita o clique acidental no mobile
            desviar();
        });

        // Evento de clique final
        btn.addEventListener('click', () => {
            if (tentativas >= limiteFuga) {
                document.getElementById('conteudo-final').style.display = 'flex';
            }
        });

        // Corações de fundo
        setInterval(() => {
            const h = document.createElement('div');
            h.classList.add('heart-bg');
            h.innerHTML = '❤️';
            h.style.left = Math.random() * 100 + 'vw';
            document.body.appendChild(h);
            setTimeout(() => h.remove(), 6000);
        }, 500);
    </script>
</body>
</html>

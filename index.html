<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pega o Coração!</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: linear-gradient(135deg, #ff75c3, #8f44ad);
            font-family: 'Arial Black', sans-serif;
            overflow: hidden;
            text-align: center;
            position: relative;
        }

        #instrucao {
            color: black;
            font-size: 2rem;
            margin-bottom: 20px;
            z-index: 10;
            padding: 0 20px;
        }

        /* O botão de coração que foge */
        .btn-coracao {
            font-size: 5rem;
            background: none;
            border: none;
            cursor: pointer;
            z-index: 10;
            position: absolute; /* Essencial para mover o botão */
            transition: all 0.1s ease; /* Transição rápida para o movimento */
            animation: pulsar 1.5s infinite;
        }

        @keyframes pulsar {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        /* Área para as mensagens fofas e imagens */
        #conteudo-final {
            display: none; /* Começa escondido */
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.9); /* Fundo branco semi-transparente */
            padding: 20px;
            box-sizing: border-box;
        }

        #mensagem-final {
            color: #8f44ad;
            font-size: 2.5rem;
            margin-bottom: 30px;
        }

        .imagem-fofa {
            max-width: 80%;
            max-height: 50vh;
            border-radius: 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            margin-bottom: 20px;
        }

        #btn-reiniciar {
            font-size: 1.2rem;
            padding: 10px 20px;
            background-color: #ff75c3;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-family: 'Arial', sans-serif;
        }

        /* Corações flutuantes de fundo */
        .heart-bg {
            position: absolute;
            color: rgba(255, 255, 255, 0.4);
            font-size: 20px;
            animation: float 6s linear infinite;
            bottom: -50px;
            z-index: 1;
        }

        @keyframes float {
            0% { transform: translateY(0) rotate(0deg); opacity: 1; }
            100% { transform: translateY(-110vh) rotate(360deg); opacity: 0; }
        }
    </style>
</head>
<body>

    <div id="jogo">
        <div id="instrucao">TENTE PEGAR MEU CORAÇÃO! ❤️</div>
        <button id="coracao-foge" class="btn-coracao">❤️</button>
    </div>

    <div id="conteudo-final">
        <div id="mensagem-final"></div>
        <img id="imagem-fofa" class="imagem-fofa" src="" alt="Imagem Fofa">
        <button id="btn-reiniciar" onclick="reiniciarJogo()">Tentar de Novo?</button>
    </div>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Heart Catch · romantic game</title>
  <!-- Google Fonts: bold playful vibe -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800;900&family=Poppins:wght@600;700&display=swap" rel="stylesheet">
  <style>
    /* RESET + full bleed */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      user-select: none; /* avoid accidental selections while chasing */
    }

    body {
      min-height: 100vh;
      background: linear-gradient(45deg, #8f44ad, #ff75c3, #8f44ad, #ff75c3);
      background-size: 400% 400%;
      animation: gradientWaltz 16s ease infinite;
      font-family: 'Poppins', 'Montserrat', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow-x: hidden;
      touch-action: pan-y pinch-zoom; /* prevent pull-to-refresh interference, keep touch */
    }

    @keyframes gradientWaltz {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    /* ---------- floating hearts (particle system) ---------- */
    .floating-hearts {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none; /* let clicks pass through */
      z-index: 1;
    }

    .heart-particle {
      position: absolute;
      color: rgba(255, 255, 255, 0.7);
      font-size: 1.8rem;
      opacity: 0;
      animation: floatUp 12s linear infinite;
      filter: drop-shadow(0 0 6px rgba(255, 120, 200, 0.6));
      will-change: transform, opacity;
    }

    @keyframes floatUp {
      0% { transform: translateY(110vh) scale(0.8); opacity: 0.4; }
      50% { opacity: 0.9; transform: translateY(50vh) scale(1.2) rotate(8deg); }
      100% { transform: translateY(-20vh) scale(0.6); opacity: 0; }
    }

    /* positions randomly generated via JS, but base style ready */

    /* main container – everything sits on a soft layer above floating hearts */
    .game-wrapper {
      position: relative;
      z-index: 10;
      width: 100%;
      max-width: 600px;
      padding: 1rem 1.5rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh; /* fallback for vertical centering */
    }

    /* status panel with playful remark */
    .status-panel {
      background: rgba(255, 255, 255, 0.25);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-radius: 60px;
      padding: 0.9rem 2.2rem;
      margin-bottom: 2.5rem;
      border: 1px solid rgba(255,255,255,0.3);
      box-shadow: 0 15px 35px rgba(0,0,0,0.1);
    }

    .remark {
      font-size: 1.8rem;
      font-weight: 800;
      letter-spacing: 1px;
      color: white;
      text-shadow: 3px 3px 0 rgba(0,0,0,0.1);
      font-family: 'Montserrat', sans-serif;
      text-align: center;
      line-height: 1.3;
    }
    .remark span {
      display: inline-block;
      min-width: 180px;
    }

    /* hunting zone – relative for heart absolute placement */
    .hunting-zone {
      position: relative;
      width: 100%;
      min-height: 300px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 1rem 0 2rem;
      touch-action: none; /* disable scroll while interacting inside zone (optional) */
    }

    /* the fleeing heart – 3D / glassmorphism style with pulse */
    .heart-btn {
      position: absolute;
      font-size: 5.5rem;
      cursor: pointer;
      transition: transform 0.1s ease; /* micro smoothness, but teleport is instant */
      filter: drop-shadow(0 20px 25px rgba(0,0,0,0.3)) drop-shadow(0 0 15px #ffa0d0);
      transform-style: preserve-3d;
      animation: pulse-glow 1.6s infinite ease-in-out;
      text-shadow: 0 0 20px #ffd0e0;
      will-change: transform, filter;
      background: transparent;
      border: none;
      line-height: 1;
    }

    @keyframes pulse-glow {
      0% { transform: scale(1) translateZ(0); filter: drop-shadow(0 10px 20px #f66); }
      50% { transform: scale(1.15) translateZ(10px); filter: drop-shadow(0 25px 35px #ff3b6f); }
      100% { transform: scale(1) translateZ(0); filter: drop-shadow(0 10px 20px #f66); }
    }

    /* final state: heart stops fleeing, intense glow, invites click */
    .heart-btn.yield {
      animation: none; /* stop pulsing? keep a strong glow but no teleport */
      filter: drop-shadow(0 0 40px #ffeb99) drop-shadow(0 0 80px #ffb3c6);
      transform: scale(1.2);
      transition: filter 0.3s, transform 0.2s;
    }

    /* reveal card – hidden until final click */
    .reveal-card {
      background: rgba(255, 255, 255, 0.2);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border-radius: 50px;
      padding: 2.5rem 2rem;
      width: 100%;
      border: 1px solid rgba(255,255,255,0.5);
      box-shadow: 0 30px 50px rgba(0,0,0,0.2), 0 0 0 2px rgba(255,255,255,0.3) inset;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.8rem;
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.6s ease, visibility 0s 0.6s;
      margin-top: 1.5rem;
    }

    .reveal-card.show {
      opacity: 1;
      visibility: visible;
      transition: opacity 0.6s ease, visibility 0s 0s;
    }

    .love-message {
      font-size: 2.2rem;
      font-weight: 900;
      color: white;
      text-align: center;
      line-height: 1.3;
      text-shadow: 4px 4px 0 #b0427b;
      font-family: 'Montserrat', sans-serif;
      word-break: break-word;
    }

    .gif-placeholder {
      width: 200px;
      height: 200px;
      border-radius: 40px;
      background: rgba(255,210,230,0.3);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 5rem;
      box-shadow: 0 20px 30px rgba(0,0,0,0.2);
      border: 3px solid white;
    }

    .replay-btn {
      background: white;
      border: none;
      padding: 1.2rem 3rem;
      border-radius: 50px;
      font-size: 1.7rem;
      font-weight: bold;
      color: #b52b65;
      box-shadow: 0 12px 0 #b04b7a, 0 8px 25px hotpink;
      cursor: pointer;
      transition: all 0.1s ease;
      font-family: 'Poppins', sans-serif;
      letter-spacing: 1px;
      margin-top: 0.5rem;
    }

    .replay-btn:active {
      transform: translateY(8px);
      box-shadow: 0 4px 0 #b04b7a, 0 8px 20px hotpink;
    }

    /* extra small adaptation */
    @media (max-width: 450px) {
      .remark { font-size: 1.4rem; }
      .heart-btn { font-size: 4.5rem; }
      .love-message { font-size: 1.8rem; }
    }

    /* heart burst canvas for confetti (absolute) */
    #heart-canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 9999;
      display: none;
    }
  </style>
</head>
<body>
  <!-- background floating hearts (particles) -->
  <div class="floating-hearts" id="floatingHearts"></div>

  <!-- main interactive area -->
  <div class="game-wrapper">
    <div class="status-panel">
      <div class="remark" id="statusRemark">❤️‍🔥 Catch me?</div>
    </div>

    <div class="hunting-zone" id="huntingZone">
      <button class="heart-btn" id="fleeingHeart" aria-label="fleeing heart">❤️</button>
    </div>

    <!-- grand reveal card (glassmorphism) -->
    <div class="reveal-card" id="revealCard">
      <div class="love-message" id="loveMessage">you're my forever</div>
      <div class="gif-placeholder" id="gifBox">💖🥺💖</div>
      <button class="replay-btn" id="replayBtn">again</button>
    </div>
  </div>

  <!-- hidden canvas for heart burst -->
  <canvas id="heart-canvas"></canvas>

  <script>
    (function() {
      // -------------------- playful remarks array --------------------
      const remarks = [
        "Too fast for you! 💨",
        "Nice try! 😏",
        "You're getting closer! 🔥",
        "woosh~ missed!",
        "nope, not today 💕",
        "catch me if you can 🏃‍♂️",
        "almost... but no ❤️‍🔥",
        "faster, love! 💘",
        "slippery heart!",
        "😜 ha!",
        "still running~",
        "off I go!"
      ];

      // -------------------- love messages array (5) --------------------
      const loveMessages = [
        "You're my favorite hello",
        "my heart is yours forever",
        "all of me loves all of you",
        "endless love, infinite times",
        "you're the piece I needed"
      ];

      // DOM elements
      const heart = document.getElementById('fleeingHeart');
      const remarkEl = document.getElementById('statusRemark');
      const revealCard = document.getElementById('revealCard');
      const loveMsgEl = document.getElementById('loveMessage');
      const replayBtn = document.getElementById('replayBtn');
      const huntingZone = document.getElementById('huntingZone');

      // Game state
      let escapeCount = 0;            // failed attempts (teleports)
      const MAX_ESCAPES = 7;
      let gamePhase = 'chasing';       // 'chasing' or 'yield' or 'reveal'
      let canTeleport = true;          // after yield, disable teleport
      let timeoutId = null;            // optional

      // canvas references for heart burst
      const canvas = document.getElementById('heart-canvas');
      let ctx = canvas.getContext('2d');
      let particles = [];
      let animationFrame = null;

      // ---------- utility: random position within viewport (keeping heart fully visible) ----------
      function getRandomVisiblePosition() {
        const heartRect = heart.getBoundingClientRect();
        const heartWidth = heartRect.width;
        const heartHeight = heartRect.height;

        // safe zone boundaries (viewport minus element size)
        const maxLeft = window.innerWidth - heartWidth;
        const maxTop = window.innerHeight - heartHeight;

        // ensure we never go negative (clamp to 0) or overflow
        const left = Math.max(0, Math.min(maxLeft, Math.random() * window.innerWidth));
        const top = Math.max(0, Math.min(maxTop, Math.random() * window.innerHeight));

        return { left, top };
      }

      // ---------- place heart at random visible position ----------
      function teleportHeart() {
        if (!canTeleport || gamePhase !== 'chasing') return;

        const pos = getRandomVisiblePosition();
        heart.style.left = pos.left + 'px';
        heart.style.top = pos.top + 'px';
        // ensure heart is positioned absolute inside huntingZone? we use absolute inside wrapper? 
        // heart is inside huntingZone which is relative. So we set relative to that container.
        // But container huntingZone has no fixed height? better to attach to wrapper?
        // To make it truly viewport-relative we need to use fixed? but then container may clip.
        // EASIER: we position heart relative to viewport? but we want it inside the hunting zone area.
        // To avoid clipping, we use viewport-absolute positioning but it will escape wrapper.
        // That's okay for "flee" feeling! yes – the heart can fly anywhere on screen.
        // But we also want the click to remain. We'll set .heart-btn to position: fixed?
        // Buttons inside wrapper? Let's switch to fixed positioning so it can truly flee anywhere.
        // Adjust CSS: .heart-btn { position: fixed; } and remove huntingZone relative.
        // We'll modify inline.
      }

      // fix: change heart to fixed positioning dynamically? better update CSS directly.
      // We'll apply style in script start.
      heart.style.position = 'fixed';
      heart.style.zIndex = '999'; // above most things
      heart.style.left = '50%';
      heart.style.top = '50%';
      heart.style.transform = 'translate(-50%, -50%)'; // center initial

      // update getRandomVisiblePosition remains fine (window relative)

      // remark update
      function setRandomRemark() {
        const randomIdx = Math.floor(Math.random() * remarks.length);
        remarkEl.innerText = remarks[randomIdx];
      }

      // flee handler (mouseenter / touchstart)
      function fleeHandler(e) {
        e.preventDefault();   // avoid any default (like mouse selection)
        if (gamePhase !== 'chasing') return;
        if (!canTeleport) return;

        escapeCount++;
        setRandomRemark();

        // after MAX_ESCAPES, yield (stop moving, glow, special message)
        if (escapeCount >= MAX_ESCAPES) {
          gamePhase = 'yield';
          canTeleport = false;          // stop teleporting
          heart.classList.add('yield');
          remarkEl.innerText = '✨ You win! My heart is tired of running. Click it! ✨';
          // heart remains at last position
        } else {
          // teleport heart
          const pos = getRandomVisiblePosition();
          heart.style.left = pos.left + 'px';
          heart.style.top = pos.top + 'px';
        }
      }

      // final click handler (only when yield, then show reveal)
      function heartFinalClick(e) {
        if (gamePhase === 'yield') {
          // trigger grand reveal
          gamePhase = 'reveal';
          // stop flee events
          canTeleport = false;

          // pick random love message
          const randomLove = loveMessages[Math.floor(Math.random() * loveMessages.length)];
          loveMsgEl.innerText = randomLove;

          // show card
          revealCard.classList.add('show');

          // massive heart burst (confetti)
          startHeartBurst();

          // hide the heart? we can keep it but less intrusive
          heart.style.opacity = '0.3';
          heart.style.pointerEvents = 'none';
          // optional remark
          remarkEl.innerText = '❤️❤️❤️ forever! ❤️❤️❤️';
        }
      }

      // Replay: restart everything
      function restartGame() {
        escapeCount = 0;
        gamePhase = 'chasing';
        canTeleport = true;
        heart.classList.remove('yield');
        heart.style.opacity = '1';
        heart.style.pointerEvents = 'auto';
        revealCard.classList.remove('show');
        remarkEl.innerText = '❤️‍🔥 Catch me?';
        // initial heart position (center)
        heart.style.left = '50%';
        heart.style.top = '50%';
        heart.style.transform = 'translate(-50%, -50%)'; // if needed, but fixed pos
        // stop canvas animation
        if (animationFrame) {
          cancelAnimationFrame(animationFrame);
          animationFrame = null;
        }
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        canvas.style.display = 'none';
        particles = [];
      }

      // ---------- Heart burst / confetti (canvas) ----------
      function startHeartBurst() {
        canvas.style.display = 'block';
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        // create 200 heart particles
        for (let i = 0; i < 200; i++) {
          particles.push({
            x: Math.random() * canvas.width,
            y: Math.random() * canvas.height,
            vx: (Math.random() - 0.5) * 12,
            vy: (Math.random() - 1.5) * 10 - 5, // mostly upward
            size: Math.random() * 30 + 15,
            opacity: Math.random() * 0.8 + 0.2,
            heart: Math.random() > 0.3 ? '❤️' : '💖', // mix
          });
        }

        function drawParticles() {
          ctx.clearRect(0, 0, canvas.width, canvas.height);
          let alive = false;
          for (let p of particles) {
            p.x += p.vx;
            p.y += p.vy;
            p.vy += 0.15; // gravity
            p.vx *= 0.99;
            p.opacity *= 0.995;
            if (p.y < canvas.height + 50 && p.opacity > 0.01) alive = true;

            ctx.font = `${p.size}px 'Segoe UI', 'Arial', sans-serif`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.shadowColor = 'hotpink';
            ctx.shadowBlur = 15;
            ctx.globalAlpha = p.opacity;
            ctx.fillStyle = 'white';
            ctx.fillText(p.heart, p.x, p.y);
          }
          ctx.shadowBlur = 0;
          ctx.globalAlpha = 1;

          if (alive) {
            animationFrame = requestAnimationFrame(drawParticles);
          } else {
            canvas.style.display = 'none';
            particles = [];
          }
        }
        drawParticles();
      }

      // Event listeners: mouseenter + touchstart (mobile)
      heart.addEventListener('mouseenter', fleeHandler);
      heart.addEventListener('touchstart', fleeHandler, { passive: false });

      // final click
      heart.addEventListener('click', heartFinalClick);

      // Replay button
      replayBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        restartGame();
      });

      // generate floating hearts (background particles)
      function generateFloatingHearts(count = 18) {
        const container = document.getElementById('floatingHearts');
        for (let i = 0; i < count; i++) {
          const span = document.createElement('span');
          span.className = 'heart-particle';
          span.innerText = Math.random() > 0.5 ? '❤️' : '💗';
          span.style.left = Math.random() * 100 + '%';
          span.style.animationDelay = Math.random() * 12 + 's';
          span.style.animationDuration = (Math.random() * 8 + 8) + 's'; // 8-16s
          span.style.fontSize = (Math.random() * 30 + 20) + 'px';
          container.appendChild(span);
        }
      }
      generateFloatingHearts(22);

      // ensure canvas resizes with window
      window.addEventListener('resize', () => {
        if (canvas.style.display === 'block') {
          canvas.width = window.innerWidth;
          canvas.height = window.innerHeight;
        }
        // if heart is in fleeing phase and visible, we may re-teleport? but don't auto teleport on resize, keep pos.
      });

      // also detect bounds on flee, but teleport already uses viewport dimensions at call moment.

      // disable context menu on heart
      heart.addEventListener('contextmenu', (e) => e.preventDefault());

      // extra safety: for touch devices, avoid page zoom when double tapping heart
      heart.addEventListener('touchstart', (e) => {
        if (gamePhase === 'chasing') e.preventDefault();
      }, { passive: false });

      // initial heart position at center (already)
      heart.style.left = '50%';
      heart.style.top = '50%';
      heart.style.transform = 'translate(-50%, -50%)';
    })();
  </script>
</body>
</html>

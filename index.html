<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pega o Coração!</title>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            margin: 0; padding: 0;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            height: 100vh; width: 100vw;
            background: linear-gradient(135deg, #ff75c3, #8f44ad);
            font-family: sans-serif;
            overflow: hidden; /* Impede que a tela balance ou role */
            position: fixed; /* Trava o fundo no mobile */
        }

        #instrucao {
            color: white;
            font-size: 1.5rem;
            font-weight: bold;
            text-align: center;
            z-index: 5;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
            pointer-events: none; /* Não atrapalha o clique */
            padding: 20px;
        }

        .btn-coracao {
            font-size: 4rem;
            background: none; border: none;
            cursor: pointer;
            z-index: 100;
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            transition: all 0.15s ease-out;
            display: block;
        }

        #conteudo-final {
            display: none;
            flex-direction: column;
            justify-content: center; align-items: center;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: white; z-index: 200;
            padding: 20px;
        }

        .imagem-fofa {
            max-width: 90%;
            border-radius: 15px;
            margin: 20px 0;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .heart-bg {
            position: absolute;
            color: rgba(255, 255, 255, 0.3);
            animation: float 5s linear infinite;
            bottom: -50px;
            pointer-events: none;
        }

        @keyframes float {
            0% { transform: translateY(0); opacity: 1; }
            100% { transform: translateY(-110vh); opacity: 0; }
        }
    </style>
</head>
<body>

    <div id="instrucao">TENTE PEGAR MEU CORAÇÃO! ❤️</div>
    <button id="coracao-foge" class="btn-coracao">❤️</button>

    <div id="conteudo-final">
        <h1 style="color: #8f44ad; text-align: center;">VOCÊ ME PEGOU! ❤️</h1>
        <p style="font-size: 1.1rem; text-align: center;">SÓ VOCÊ ESTÁ NO MEU CORAÇÃO!</p>
        <img class="imagem-fofa" src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExNHJueGZ3bmZ3bmZ3bmZ3bmZ3bmZ3bmZ3bmZ3bmZ3bmZ3bmZ3bmZ3JmVwPXYxX2ludGVybmFsX2dpZl9ieV9pZCZjdD1n/K1TQa8wwqqUyc/giphy.gif">
        <button onclick="location.reload()" style="padding: 12px 25px; border-radius: 20px; background: #ff75c3; color: white; border: none; font-weight: bold;">Recomeçar</button>
    </div>

    <script>
        const btn = document.getElementById('coracao-foge');
        const instrucao = document.getElementById('instrucao');
        let tentativas = 0;
        const limiteFuga = 5; 

        function mover(e) {
            if (tentativas < limiteFuga) {
                // Impede o comportamento padrão do toque para não travar
                if(e) e.preventDefault();

                // Calcula área disponível (janela menos tamanho do botão)
                const maxX = window.innerWidth - btn.offsetWidth;
                const maxY = window.innerHeight - btn.offsetHeight;

                // Gera posições dentro do limite visível
                const newX = Math.random() * maxX;
                const newY = Math.random() * maxY;

                btn.style.left = newX + 'px';
                btn.style.top = newY + 'px';
                btn.style.transform = 'none'; // Importante para mobile
                
                tentativas++;
                
                if (tentativas >= limiteFuga) {
                    instrucao.innerText = "OK, VOCÊ VENCEU! CLICA AGORA! ❤️";
                    btn.style.transition = "transform 0.3s";
                    btn.style.filter = "drop-shadow(0 0 15px gold)";
                }
            }
        }

        // Eventos Mobile e PC
        btn.addEventListener('touchstart', mover, {passive: false});
        btn.addEventListener('mouseover', mover);

        // Clique para abrir o prêmio
        btn.addEventListener('click', () => {
            if (tentativas >= limiteFuga) {
                document.getElementById('conteudo-final').style.display = 'flex';
            }
        });

        // Corações de fundo (menos frequência para não travar celular fraco)
        setInterval(() => {
            const h = document.createElement('div');
            h.classList.add('heart-bg');
            h.innerHTML = '❤️';
            h.style.left = Math.random() * 100 + 'vw';
            h.style.fontSize = (Math.random() * 20 + 10) + 'px';
            document.body.appendChild(h);
            setTimeout(() => h.remove(), 5000);
        }, 800);
    </script>
</body>
</html>

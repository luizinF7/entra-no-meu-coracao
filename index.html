<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Heart Catch · versão PT · suave</title>
  <!-- Google Fonts: bold e moderno -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800;900&family=Poppins:wght@600;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      -webkit-touch-callout: none;
    }

    body {
      min-height: 100vh;
      min-height: -webkit-fill-available;
      background: linear-gradient(145deg, #8f44ad, #ff75c3, #b84a8c, #ff75c3);
      background-size: 300% 300%;
      animation: gradientBR 16s ease infinite;
      font-family: 'Poppins', 'Montserrat', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow-x: hidden;
      touch-action: pan-y pinch-zoom; /* permite rolagem vertical suave */
    }

    @keyframes gradientBR {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    /* PARTÍCULAS DE CORAÇÃO - sem overlap graças a posições aleatórias e tamanhos variados */
    .floating-hearts {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 1;
      overflow: hidden;
    }

    .heart-particle {
      position: absolute;
      color: rgba(255, 240, 250, 0.75);
      font-size: 2rem;
      opacity: 0;
      animation: floatPT 14s linear infinite;
      filter: drop-shadow(0 0 6px #ffb6d9);
      will-change: transform, opacity;
      /* distribuição garantida sem sobreposição visual */
    }

    @keyframes floatPT {
      0% { transform: translateY(110vh) scale(0.5); opacity: 0.1; }
      30% { opacity: 0.9; }
      70% { opacity: 0.7; transform: translateY(30vh) scale(1.2) rotate(3deg); }
      100% { transform: translateY(-20vh) scale(0.4); opacity: 0; }
    }

    /* container principal flexível */
    .game-wrapper {
      position: relative;
      z-index: 20;
      width: 100%;
      max-width: 700px;
      padding: 1rem 1.2rem 2rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      min-height: -webkit-fill-available;
    }

    /* painel de status com vidro fosco */
    .status-panel {
      background: rgba(255, 255, 255, 0.2);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border-radius: 60px;
      padding: 0.8rem 2rem;
      margin: 0.5rem 0 2rem;
      border: 1px solid rgba(255,255,255,0.4);
      box-shadow: 0 15px 30px rgba(0,0,0,0.15);
      width: fit-content;
    }

    .remark {
      font-size: 1.9rem;
      font-weight: 800;
      color: white;
      text-shadow: 3px 3px 0 #b03b70;
      font-family: 'Montserrat', sans-serif;
      text-align: center;
      line-height: 1.3;
      white-space: nowrap;
    }
    @media (max-width: 500px) {
      .remark { font-size: 1.5rem; white-space: normal; }
    }

    /* zona de caça - apenas para referência, o coração é fixed */
    .heart-zone {
      position: relative;
      width: 100%;
      min-height: 240px;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none; /* não bloqueia o coração fixed */
    }

    /* CORAÇÃO FUGITIVO - FIXED NA TELA INTEIRA, SEM TRAVAMENTO */
    .heart-btn {
      position: fixed;
      font-size: 6rem;
      background: transparent;
      border: none;
      cursor: pointer;
      filter: drop-shadow(0 15px 25px #ff4090);
      animation: pulseSuave 1.6s infinite alternate ease-in-out;
      text-shadow: 0 0 30px #ffb0d0;
      line-height: 1;
      padding: 0;
      margin: 0;
      will-change: left, top, filter;
      z-index: 1000;
      -webkit-tap-highlight-color: transparent;
      touch-action: none; /* impede scroll ao tocar */
      pointer-events: auto;
      transition: opacity 0.2s;
    }

    @keyframes pulseSuave {
      0% { transform: scale(1); filter: drop-shadow(0 10px 20px #ff80b0); }
      100% { transform: scale(1.1); filter: drop-shadow(0 25px 35px #ff3f8f); }
    }

    .heart-btn.yield {
      animation: none;
      filter: drop-shadow(0 0 45px #ffeeb0) drop-shadow(0 0 90px #ff80b5);
      transform: scale(1.2);
    }

    /* CARTÃO DE REVELAÇÃO (glassmorphism) */
    .reveal-card {
      background: rgba(255, 255, 255, 0.18);
      backdrop-filter: blur(22px);
      -webkit-backdrop-filter: blur(22px);
      border-radius: 70px;
      padding: 2.5rem 2rem;
      width: 100%;
      border: 1px solid rgba(255,255,255,0.5);
      box-shadow: 0 30px 50px rgba(0,0,0,0.25), inset 0 3px 6px rgba(255,255,255,0.6);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2rem;
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.5s ease, visibility 0s 0.5s;
    }

    .reveal-card.show {
      opacity: 1;
      visibility: visible;
      transition: opacity 0.5s ease, visibility 0s 0s;
    }

    .love-message {
      font-size: 2.4rem;
      font-weight: 900;
      color: white;
      text-align: center;
      text-shadow: 4px 4px 0 #b23b75;
      font-family: 'Montserrat', sans-serif;
      line-height: 1.2;
    }

    .gif-placeholder {
      width: 180px;
      height: 180px;
      border-radius: 50px;
      background: rgba(255,215,235,0.3);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 5.5rem;
      border: 4px solid white;
      box-shadow: 0 20px 30px rgba(0,0,0,0.2);
    }

    .replay-btn {
      background: white;
      border: none;
      padding: 1.2rem 3rem;
      border-radius: 60px;
      font-size: 1.9rem;
      font-weight: bold;
      color: #b1316a;
      box-shadow: 0 10px 0 #a13d68, 0 8px 30px hotpink;
      cursor: pointer;
      transition: all 0.1s linear;
      font-family: 'Poppins', sans-serif;
    }

    .replay-btn:active {
      transform: translateY(8px);
      box-shadow: 0 2px 0 #a13d68, 0 8px 25px hotpink;
    }

    /* Canvas para explosão de corações (sem lag) */
    #heartCanvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 9999;
      display: none;
    }

    @media (max-width: 450px) {
      .heart-btn { font-size: 5.2rem; }
      .love-message { font-size: 2rem; }
      .gif-placeholder { width: 150px; height: 150px; font-size: 4.5rem; }
    }
  </style>
</head>
<body>
  <!-- camada de corações flutuantes (sem overlapping visual) -->
  <div class="floating-hearts" id="floatingHearts"></div>

  <div class="game-wrapper">
    <div class="status-panel">
      <div class="remark" id="statusRemark">💓 pegue-me?</div>
    </div>

    <!-- zona vazia (o coração está fixed no body) -->
    <div class="heart-zone"></div>

    <!-- cartão de vitória -->
    <div class="reveal-card" id="revealCard">
      <div class="love-message" id="loveMessage">meu coração é seu</div>
      <div class="gif-placeholder" id="gifBox">💕🥰💕</div>
      <button class="replay-btn" id="replayBtn">de novo</button>
    </div>
  </div>

  <canvas id="heartCanvas"></canvas>

  <script>
    (function() {
      // ---------- TRADUÇÃO COMPLETA PARA PORTUGUÊS ----------
      const remarks = [
        "Muito rápido! 💨", "Quase! 😏", "pegadinha! 🔥", "uoooosh~",
        "não pegou 💕", "me pega 🏃", "mais rápido 💘", "escorregadio!",
        "fugiu de novo!", "😜 tente outra vez"
      ];

      const loveMessages = [
        "meu coração é seu",
        "você é meu favorito",
        "todo meu amor é pra você",
        "infinitamente seu",
        "amo você sem limites"
      ];

      // Elementos principais
      const heartBtn = document.createElement('button');
      heartBtn.className = 'heart-btn';
      heartBtn.id = 'fleeingHeart';
      heartBtn.setAttribute('aria-label', 'coração fugitivo');
      heartBtn.innerHTML = '❤️';
      document.body.appendChild(heartBtn);  // fixed no body

      // Posição inicial centralizada
      heartBtn.style.position = 'fixed';
      heartBtn.style.zIndex = '1000';
      heartBtn.style.left = '50%';
      heartBtn.style.top = '50%';
      heartBtn.style.transform = 'translate(-50%, -50%)';

      const remarkEl = document.getElementById('statusRemark');
      const revealCard = document.getElementById('revealCard');
      const loveMsgEl = document.getElementById('loveMessage');
      const replayBtn = document.getElementById('replayBtn');
      const canvas = document.getElementById('heartCanvas');
      const ctx = canvas.getContext('2d');

      // ---------- ESTADO DO JOGO ----------
      let escapeCount = 0;
      const MAX_ESCAPES = 7;
      let gamePhase = 'chasing';        // chasing, yield, reveal
      let canTeleport = true;
      let teleportLock = false;          // trava para evitar múltiplos teleportes

      // ---------- UTILITÁRIO: posição aleatória segura (sem sair da tela) ----------
      function getSafeRandomPos() {
        const w = heartBtn.offsetWidth || 90;
        const h = heartBtn.offsetHeight || 90;
        const maxLeft = window.innerWidth - w - 4;    // margem 4px
        const maxTop = window.innerHeight - h - 4;
        const left = Math.max(4, Math.min(maxLeft, Math.random() * window.innerWidth));
        const top = Math.max(4, Math.min(maxTop, Math.random() * window.innerHeight));
        return { left, top };
      }

      // Teleporte controlado (sem lag, com lock de 50ms)
      function teleportHeart() {
        if (!canTeleport || gamePhase !== 'chasing' || teleportLock) return;
        teleportLock = true;
        const pos = getSafeRandomPos();
        heartBtn.style.left = pos.left + 'px';
        heartBtn.style.top = pos.top + 'px';
        setTimeout(() => { teleportLock = false; }, 50);  // 50ms cooldown suficiente
      }

      // Atualiza frase aleatória
      function updateRemark() {
        const idx = Math.floor(Math.random() * remarks.length);
        remarkEl.innerText = remarks[idx];
      }

      // ---------- HANDLER DE FUGA (mouse + toque) ----------
      function fleeHandler(e) {
        e.preventDefault();  // essencial para evitar zoom/scroll
        if (gamePhase !== 'chasing' || !canTeleport) return;

        escapeCount++;
        updateRemark();

        if (escapeCount >= MAX_ESCAPES) {
          // Modo "cansado" - coração para e brilha
          gamePhase = 'yield';
          canTeleport = false;
          heartBtn.classList.add('yield');
          remarkEl.innerText = '✨ Você venceu! Meu coração está cansado. Clique! ✨';
        } else {
          teleportHeart();
        }
      }

      // Eventos: mouse enter e touch start (comportamento consistente)
      heartBtn.addEventListener('mouseenter', fleeHandler);
      heartBtn.addEventListener('touchstart', fleeHandler, { passive: false });

      // ---------- CLIQUE FINAL (quando yield) ----------
      function finalCatchHandler(e) {
        e.preventDefault();
        if (gamePhase === 'yield') {
          gamePhase = 'reveal';
          canTeleport = false;

          // Escolhe mensagem de amor aleatória
          loveMsgEl.innerText = loveMessages[Math.floor(Math.random() * loveMessages.length)];

          // Exibe cartão
          revealCard.classList.add('show');

          // Dispara corações na tela (efeito visual)
          startHeartExplosion();

          // Enfraquece o coração
          heartBtn.style.opacity = '0.4';
          heartBtn.style.pointerEvents = 'none';
          remarkEl.innerText = '❤️ para sempre ❤️';
        }
      }

      heartBtn.addEventListener('click', finalCatchHandler);
      heartBtn.addEventListener('touchend', (e) => { e.preventDefault(); finalCatchHandler(e); });

      // ---------- REINICIAR JOGO ----------
      function restartGame() {
        escapeCount = 0;
        gamePhase = 'chasing';
        canTeleport = true;
        teleportLock = false;
        heartBtn.classList.remove('yield');
        heartBtn.style.opacity = '1';
        heartBtn.style.pointerEvents = 'auto';
        revealCard.classList.remove('show');

        // centraliza suavemente
        const left = (window.innerWidth / 2) - (heartBtn.offsetWidth / 2);
        const top = (window.innerHeight / 2) - (heartBtn.offsetHeight / 2);
        heartBtn.style.left = Math.max(4, left) + 'px';
        heartBtn.style.top = Math.max(4, top) + 'px';

        remarkEl.innerText = '💓 pegue-me?';

        // limpa canvas
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        canvas.style.display = 'none';
        if (explosionFrame) cancelAnimationFrame(explosionFrame);
        explosionFrame = null;
      }

      replayBtn.addEventListener('click', restartGame);
      replayBtn.addEventListener('touchend', (e) => { e.preventDefault(); restartGame(); });

      // ---------- EXPLOSÃO DE CORAÇÕES (SEM LAG, LEVE) ----------
      let particles = [];
      let explosionFrame = null;

      function startHeartExplosion() {
        canvas.style.display = 'block';
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        particles = [];
        for (let i = 0; i < 130; i++) {  // quantidade moderada para manter fluidez
          particles.push({
            x: Math.random() * canvas.width,
            y: Math.random() * canvas.height,
            vx: (Math.random() - 0.5) * 10,
            vy: (Math.random() - 1.2) * 10 - 5,
            size: Math.random() * 32 + 18,
            opacity: Math.random() * 0.9 + 0.2,
            char: Math.random() > 0.4 ? '❤️' : '💖',
          });
        }

        function drawExplosion() {
          ctx.clearRect(0, 0, canvas.width, canvas.height);
          let active = false;
          for (let p of particles) {
            p.x += p.vx;
            p.y += p.vy;
            p.vy += 0.2;   // gravidade suave
            p.vx *= 0.99;
            p.opacity *= 0.994;
            if (p.y < canvas.height + 70 && p.opacity > 0.01) active = true;

            ctx.font = `${p.size}px 'Segoe UI', 'Arial', 'Apple Color Emoji'`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.shadowColor = '#ffa0c0';
            ctx.shadowBlur = 20;
            ctx.globalAlpha = p.opacity;
            ctx.fillStyle = 'white';
            ctx.fillText(p.char, p.x, p.y);
          }
          ctx.shadowBlur = 0;
          ctx.globalAlpha = 1;

          if (active) {
            explosionFrame = requestAnimationFrame(drawExplosion);
          } else {
            canvas.style.display = 'none';
            particles = [];
          }
        }
        drawExplosion();
      }

      // ---------- CORAÇÕES FLUTUANTES (SEM SOBREPOSIÇÃO PESADA) ----------
      function generateFloatingHearts(count = 18) {
        const container = document.getElementById('floatingHearts');
        for (let i = 0; i < count; i++) {
          const span = document.createElement('span');
          span.className = 'heart-particle';
          span.innerText = ['❤️', '💗', '💕', '💓'][Math.floor(Math.random() * 4)];
          span.style.left = Math.random() * 100 + '%';
          span.style.animationDelay = Math.random() * 12 + 's';
          span.style.animationDuration = (Math.random() * 8 + 10) + 's'; // entre 10s e 18s
          span.style.fontSize = (Math.random() * 28 + 20) + 'px';
          container.appendChild(span);
        }
      }
      generateFloatingHearts(20);

      // ---------- REDIMENSIONAMENTO: reposiciona coração se necessário ----------
      window.addEventListener('resize', () => {
        if (gamePhase === 'chasing' && canTeleport) {
          const rect = heartBtn.getBoundingClientRect();
          const buffer = 10;
          if (rect.right > window.innerWidth + buffer || rect.left < -buffer || rect.bottom > window.innerHeight + buffer || rect.top < -buffer) {
            const pos = getSafeRandomPos();
            heartBtn.style.left = pos.left + 'px';
            heartBtn.style.top = pos.top + 'px';
          }
        } else if (gamePhase === 'yield') {
          // apenas garante que não fique escondido
          const rect = heartBtn.getBoundingClientRect();
          let newLeft = rect.left;
          let newTop = rect.top;
          if (rect.right > window.innerWidth) newLeft = window.innerWidth - rect.width - 5;
          if (rect.left < 0) newLeft = 5;
          if (rect.bottom > window.innerHeight) newTop = window.innerHeight - rect.height - 5;
          if (rect.top < 0) newTop = 5;
          heartBtn.style.left = newLeft + 'px';
          heartBtn.style.top = newTop + 'px';
        }

        // redimensiona canvas se estiver ativo
        if (canvas.style.display === 'block') {
          canvas.width = window.innerWidth;
          canvas.height = window.innerHeight;
        }
      });

      // Impede scroll ao tocar no coração
      heartBtn.addEventListener('touchmove', (e) => e.preventDefault(), { passive: false });

      // Posição inicial robusta
      function setInitialPosition() {
        const left = (window.innerWidth / 2) - (heartBtn.offsetWidth / 2);
        const top = (window.innerHeight / 2) - (heartBtn.offsetHeight / 2);
        heartBtn.style.left = Math.max(4, left) + 'px';
        heartBtn.style.top = Math.max(4, top) + 'px';
      }
      setInitialPosition();
      window.addEventListener('load', setInitialPosition);

      // Previne menu de contexto
      heartBtn.addEventListener('contextmenu', (e) => e.preventDefault());

      // trava extra para evitar múltiplos toques rápidos
      let touchGuard = false;
      heartBtn.addEventListener('touchstart', (e) => {
        if (touchGuard) {
          e.preventDefault();
          return;
        }
        touchGuard = true;
        setTimeout(() => { touchGuard = false; }, 120);
      }, { passive: false });
    })();
  </script>
</body>
</html>
